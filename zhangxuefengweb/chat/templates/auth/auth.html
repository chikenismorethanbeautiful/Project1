<!-- templates/auth/auth.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>登录注册 | 峰学未来</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* 主容器 - 响应式宽度 */
        .auth-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        /* 卡片 - 毛玻璃效果 */
        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        /* 头部 */
        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 24px 32px;
            text-align: center;
            color: white;
        }

        .logo {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .auth-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .auth-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        /* Tab 选项卡 - 移动端适配 */
        .auth-tabs {
            display: flex;
            padding: 16px 24px 0;
            gap: 8px;
            border-bottom: 1px solid #eef2f8;
            background: white;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px 8px;
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            border-radius: 0;
        }

        .auth-tab.active {
            color: #667eea;
        }

        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 3px 3px 0 0;
        }

        /* 表单区域 */
        .auth-form {
            padding: 24px;
            background: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 16px;
            transition: all 0.2s;
            outline: none;
            font-family: inherit;
            background: white;
            -webkit-appearance: none;
        }

        .input-wrapper input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-wrapper input::placeholder {
            color: #94a3b8;
            font-size: 14px;
        }

        /* 验证码输入组 */
        .code-input-group {
            display: flex;
            gap: 12px;
        }

        .code-input-group input {
            flex: 1;
        }

        .get-code-btn {
            padding: 0 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .get-code-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .get-code-btn:active {
            transform: scale(0.95);
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        /* 分隔线 */
        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e2e8f0;
        }

        .divider span {
            background: white;
            padding: 0 12px;
            position: relative;
            color: #94a3b8;
            font-size: 12px;
        }

        /* Toast 提示 */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeInOut 2s ease;
            pointer-events: none;
            white-space: nowrap;
            max-width: 90%;
            white-space: normal;
            text-align: center;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        /* 平板适配 */
        @media (min-width: 768px) and (max-width: 1024px) {
            .auth-container {
                max-width: 500px;
            }
            .auth-header {
                padding: 48px 32px;
            }
            .logo {
                font-size: 64px;
            }
            .auth-header h1 {
                font-size: 28px;
            }
            .auth-form {
                padding: 32px;
            }
            .input-wrapper input {
                padding: 16px 18px;
                font-size: 16px;
            }
            .submit-btn {
                padding: 16px;
                font-size: 17px;
            }
        }

        /* 小屏手机适配 */
        @media (max-width: 380px) {
            .auth-header {
                padding: 28px 20px;
            }
            .logo {
                font-size: 44px;
            }
            .auth-header h1 {
                font-size: 20px;
            }
            .auth-tabs {
                padding: 12px 20px 0;
            }
            .auth-tab {
                padding: 10px 8px;
                font-size: 14px;
            }
            .auth-form {
                padding: 20px;
            }
            .form-group {
                margin-bottom: 16px;
            }
            .input-wrapper input {
                padding: 12px 14px;
                font-size: 14px;
            }
            .get-code-btn {
                padding: 0 14px;
                font-size: 13px;
            }
        }

        /* 横屏适配 */
        @media (max-width: 900px) and (orientation: landscape) {
            body {
                padding: 12px;
            }
            .auth-header {
                padding: 20px 24px;
            }
            .logo {
                font-size: 36px;
            }
            .auth-header h1 {
                font-size: 18px;
            }
            .auth-form {
                max-height: 60vh;
                overflow-y: auto;
            }
        }

        /* 加载状态 */
        .loading-state {
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">📘 ✨</div>
                <h1>峰学未来 · 智慧伴学</h1>
                <p>张雪峰风格AI · 高考志愿填报专家</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">密码登录</button>
                <button class="auth-tab" data-tab="sms">验证码登录</button>
                <button class="auth-tab" data-tab="register">注册账号</button>
            </div>

            <!-- 密码登录表单 -->
            <div id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>账号 / 手机号</label>
                    <div class="input-wrapper">
                        <input type="text" id="loginAccount" placeholder="请输入账号或手机号" autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" placeholder="请输入密码">
                    </div>
                </div>
                <button class="submit-btn" id="loginSubmitBtn">登 录</button>
            </div>

            <!-- 验证码登录表单 -->
            <div id="smsForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label>手机号</label>
                    <div class="input-wrapper">
                        <input type="tel" id="smsPhone" placeholder="请输入手机号" autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <label>验证码</label>
                    <div class="code-input-group">
                        <input type="text" id="smsCode" placeholder="请输入验证码">
                        <button class="get-code-btn" id="getSmsCodeBtn">获取验证码</button>
                    </div>
                </div>
                <button class="submit-btn" id="smsSubmitBtn">验证码登录</button>
            </div>

            <!-- 注册表单 -->
            <div id="registerForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label>手机号</label>
                    <div class="input-wrapper">
                        <input type="tel" id="regPhone" placeholder="请输入手机号" autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <label>用户名</label>
                    <div class="input-wrapper">
                        <input type="text" id="regUsername" placeholder="请设置用户名">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="regPassword" placeholder="请设置密码（不少于6位）">
                    </div>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="regConfirmPassword" placeholder="请再次输入密码">
                    </div>
                </div>
                <div class="form-group">
                    <label>验证码</label>
                    <div class="code-input-group">
                        <input type="text" id="regCode" placeholder="请输入验证码">
                        <button class="get-code-btn" id="getRegCodeBtn">获取验证码</button>
                    </div>
                </div>
                <button class="submit-btn" id="registerSubmitBtn">注 册</button>
            </div>
        </div>
    </div>

    <script>
        // 获取CSRF Token
        function getCSRFToken() {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, 10) === 'csrftoken=') {
                        cookieValue = decodeURIComponent(cookie.substring(10));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // 显示提示
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.textContent = message;
            if (isError) {
                toast.style.background = 'rgba(239, 68, 68, 0.9)';
            }
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // 验证手机号
        function validatePhone(phone) {
            return /^1[3-9]\d{9}$/.test(phone);
        }

        let countdownInterval = null;

        function startCountdown(button, seconds = 60) {
            if (countdownInterval) clearInterval(countdownInterval);
            button.disabled = true;
            let remaining = seconds;
            button.textContent = `${remaining}秒后重试`;
            countdownInterval = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    button.disabled = false;
                    button.textContent = '获取验证码';
                } else {
                    button.textContent = `${remaining}秒后重试`;
                }
            }, 5000);
        }

        async function sendVerificationCode(phone, type) {
            if (!validatePhone(phone)) {
                showToast('请输入正确的手机号', true);
                return false;
            }
            try {
                const response = await fetch('/auth/send-code/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCSRFToken()
                    },
                    body: JSON.stringify({ phone, type })
                });
                const data = await response.json();
                if (data.success) {
                    let msg = '验证码已发送';
                    if (data.debug_code) msg += `：${data.debug_code}`;
                    showToast(msg);
                    return true;
                } else {
                    showToast(data.error || '发送失败', true);
                    return false;
                }
            } catch (error) {
                showToast('网络错误，请稍后重试', true);
                return false;
            }
        }

        // Tab切换
        function initTabs() {
            const tabs = document.querySelectorAll('.auth-tab');
            const forms = {
                login: document.getElementById('loginForm'),
                sms: document.getElementById('smsForm'),
                register: document.getElementById('registerForm')
            };
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabName = tab.dataset.tab;
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    Object.values(forms).forEach(form => {
                        if (form) form.style.display = 'none';
                    });
                    if (tabName === 'login') forms.login.style.display = 'block';
                    else if (tabName === 'sms') forms.sms.style.display = 'block';
                    else if (tabName === 'register') forms.register.style.display = 'block';
                });
            });
        }

        // 密码登录
        async function handleLogin() {
            const account = document.getElementById('loginAccount').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!account) { showToast('请输入账号或手机号', true); return; }
            if (!password) { showToast('请输入密码', true); return; }

            const btn = document.getElementById('loginSubmitBtn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const response = await fetch('/auth/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
                    body: JSON.stringify({ phone: account, password })
                });
                const data = await response.json();
                if (data.success) {
                    showToast('登录成功！');
                    setTimeout(() => { window.location.href = '/'; }, 500);
                } else {
                    showToast(data.error || '登录失败', true);
                }
            } catch (error) {
                showToast('网络错误，请稍后重试', true);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        // 验证码登录
        async function handleSmsLogin() {
            const phone = document.getElementById('smsPhone').value.trim();
            const code = document.getElementById('smsCode').value.trim();

            if (!validatePhone(phone)) { showToast('请输入正确的手机号', true); return; }
            if (!code) { showToast('请输入验证码', true); return; }

            const btn = document.getElementById('smsSubmitBtn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const response = await fetch('/auth/sms-login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
                    body: JSON.stringify({ phone, code })
                });
                const data = await response.json();
                if (data.success) {
                    showToast(data.message || '登录成功！');
                    setTimeout(() => { window.location.href = '/'; }, 500);
                } else {
                    showToast(data.error || '登录失败', true);
                }
            } catch (error) {
                showToast('网络错误，请稍后重试', true);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        // 注册
        async function handleRegister() {
            const phone = document.getElementById('regPhone').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const code = document.getElementById('regCode').value.trim();

            if (!validatePhone(phone)) { showToast('请输入正确的手机号', true); return; }
            if (!username) { showToast('请输入用户名', true); return; }
            if (username.length < 2 || username.length > 20) { showToast('用户名长度应为2-20个字符', true); return; }
            if (!password) { showToast('请输入密码', true); return; }
            if (password.length < 6) { showToast('密码长度不能少于6位', true); return; }
            if (password !== confirmPassword) { showToast('两次输入的密码不一致', true); return; }
            if (!code) { showToast('请输入验证码', true); return; }

            const btn = document.getElementById('registerSubmitBtn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '注册中...';

            try {
                const response = await fetch('/auth/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
                    body: JSON.stringify({ phone, username, password, confirm_password: confirmPassword, code })
                });
                const data = await response.json();
                if (data.success) {
                    showToast('注册成功！');
                    setTimeout(() => { window.location.href = '/'; }, 500);
                } else {
                    showToast(data.error || '注册失败', true);
                }
            } catch (error) {
                showToast('网络错误，请稍后重试', true);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        // 检查是否已登录
        async function checkAlreadyLogin() {
            try {
                const response = await fetch('/auth/check/');
                const data = await response.json();
                if (data.is_authenticated) {
                    window.location.href = '/';
                }
            } catch (error) {
                console.log('未登录');
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 如果已登录，跳转到首页
            checkAlreadyLogin();

            initTabs();

            document.getElementById('loginSubmitBtn').addEventListener('click', handleLogin);
            document.getElementById('smsSubmitBtn').addEventListener('click', handleSmsLogin);
            document.getElementById('registerSubmitBtn').addEventListener('click', handleRegister);

            // 获取验证码按钮
            document.getElementById('getSmsCodeBtn').addEventListener('click', async (e) => {
                const phone = document.getElementById('smsPhone').value.trim();
                if (!validatePhone(phone)) { showToast('请先输入正确的手机号', true); return; }
                const success = await sendVerificationCode(phone, 'login');
                if (success) startCountdown(e.target);
            });

            document.getElementById('getRegCodeBtn').addEventListener('click', async (e) => {
                const phone = document.getElementById('regPhone').value.trim();
                if (!validatePhone(phone)) { showToast('请先输入正确的手机号', true); return; }
                const success = await sendVerificationCode(phone, 'register');
                if (success) startCountdown(e.target);
            });

            // 回车提交
            document.getElementById('loginPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin();
            });
            document.getElementById('smsCode').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSmsLogin();
            });
            document.getElementById('regConfirmPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleRegister();
            });
        });
    </script>
</body>
</html>
